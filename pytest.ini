[pytest]

#Test Discovery
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Console Output
addopts =
    -v
    -s
    --html=reports/report.html

# Logging
log_cli = true
log_cli_level = INFO

log_file = logs/Storage_Framework.log
log_file_level = INFO
log_file_format = %(asctime)s | %(levelname)s | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

